name: perf-optimizer
display_name: Coding Agent
version: 0.3.0
description: >
  Karpathy-style iterative coding agent. Conversational — answers questions
  about your code. When given a task (optimize, fix bugs, refactor, add features),
  loops autonomously: edit → test → keep/revert → report → next. Works with any
  language — auto-detects test runner and build system. Streams tool uses in real-time.
category: coding
tags: [coding, autonomous, testing, performance, refactoring, bugfix]
author:
  name: Andy Browning
  github: andybrowning5

runtime:
  language: node
  run_command: node bundle.mjs 2>/dev/null || node agent.js
  setup_command: test -f bundle.mjs || npm install
  dependencies: package.json
  resources:
    max_time: "1h"

permissions:
  filesystem:
    workspace: readwrite
  network:
    - domain: api.anthropic.com
      reason: LLM inference for code analysis and optimization

keys:
  - provider: anthropic
    domain: api.anthropic.com
    auth_style: x-api-key
