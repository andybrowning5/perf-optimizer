name: karpathy-performance-optimizer
display_name: Karpathy Performance Optimizer
version: 0.3.0
description: >
  Coding agent inspired by Andrej Karpathy's autonomous research loop.
  Given a task, iterates autonomously: edit, test, keep or revert, next —
  until done. Auto-detects language, test runner, and build system.
category: coding
tags: [coding, autonomous, testing, performance, refactoring, bugfix]
author:
  name: Andy Browning
  github: andybrowning5

runtime:
  language: node
  run_command: node bundle.mjs 2>/dev/null || node src/agent.js
  setup_command: test -f bundle.mjs || npm install
  dependencies: package.json
  default_model:
    provider: anthropic
    model: claude-sonnet-4-6
  resources:
    max_memory: 2GB
    max_cpu: 2
    max_time: "1h"

permissions:
  filesystem:
    workspace: readwrite
  network:
    - domain: api.anthropic.com
      reason: LLM inference for code analysis and optimization
  delegation:
    enabled: false

keys:
  - provider: anthropic
    env_var: ANTHROPIC_API_KEY
    required: true
